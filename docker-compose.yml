version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: claimsdb
      POSTGRES_USER: claims
      POSTGRES_PASSWORD: claims
    ports:
      - "5432:5432"
    volumes:
      - claims_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claims -d claimsdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  mock-java:
    build:
      context: ./mock-java-service
    ports:
      - "8081:8081"

  api:
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://claims:claims@db:5432/claimsdb
      MOCK_JAVA_BASE_URL: http://mock-java:8081
    depends_on:
      db:
        condition: service_healthy
      mock-java:
        condition: service_started
    ports:
      - "8000:8000"

  dashboard:
    build:
      context: ./dashboard
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    ports:
      - "8501:8501"

volumes:
  claims_db_data:
