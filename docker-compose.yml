services:
  db:
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: claimsdb
      POSTGRES_USER: claims
      POSTGRES_PASSWORD: claims
    volumes:
      - claims_db_data:/var/lib/postgresql/data
    # Postgres is not published on the host (avoids port clashes); services use db:5432 on the network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claims -d claimsdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  mock-java:
    restart: unless-stopped
    build:
      context: ./mock-java-service
    # Host ports optional; use docker-compose.dev.yml for local 8081.

  api:
    restart: unless-stopped
    build:
      context: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://claims:claims@db:5432/claimsdb
      MOCK_JAVA_BASE_URL: http://mock-java:8081
    depends_on:
      db:
        condition: service_healthy
      mock-java:
        condition: service_started
    # Host port optional; use docker-compose.dev.yml for local 8000.

  dashboard:
    restart: unless-stopped
    build:
      context: ./dashboard
    environment:
      API_BASE_URL: http://api:8000
    depends_on:
      api:
        condition: service_started
    ports:
      - "8501:8501"

volumes:
  claims_db_data:
