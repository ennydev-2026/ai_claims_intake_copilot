# Example: reverse-proxy Streamlit (e.g. dashboard on host port 8501).
# Replace SERVER_NAME and paths before use. After HTTP works:
#   sudo certbot --nginx -d YOUR_DOMAIN
#
# Install on Ubuntu/Debian (adjust filenames):
#   sudo cp deploy/nginx/streamlit-reverse-proxy.example.conf /etc/nginx/sites-available/YOUR_SITE.conf
#   sudo ln -sf /etc/nginx/sites-available/YOUR_SITE.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
upstream streamlit_dashboard {
    server 127.0.0.1:8501;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;

    location / {
        proxy_pass http://streamlit_dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
        proxy_buffering off;
    }
}
